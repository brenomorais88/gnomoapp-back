name: Feature Auto PR

on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-and-open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run unit and integration tests
        run: ./gradlew test --stacktrace

      - name: Build application
        run: ./gradlew build --stacktrace

      - name: Ensure PR token is configured
        shell: bash
        env:
          PR_CREATOR_TOKEN: ${{ secrets.PR_CREATOR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PR_CREATOR_TOKEN}" ]]; then
            echo "::error::Repository secret PR_CREATOR_TOKEN is missing."
            echo "::error::Create a PAT (classic) with 'repo' scope and save it as PR_CREATOR_TOKEN."
            exit 1
          fi

      - name: Create pull request to develop when missing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_CREATOR_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = context.ref.replace("refs/heads/", "");
            const baseBranch = "develop";

            const { data: existingPrs } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
              base: baseBranch,
            });

            if (existingPrs.length > 0) {
              core.info(`Open PR already exists: ${existingPrs[0].html_url}`);
              return;
            }

            const title = `feat: merge ${headBranch} into develop`;
            const body = [
              "## Summary",
              "- Automatic PR created after successful feature branch CI.",
              "",
              "## Branches",
              `- Source: \`${headBranch}\``,
              `- Target: \`${baseBranch}\``,
            ].join("\n");

            const { data: createdPr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head: headBranch,
              base: baseBranch,
              maintainer_can_modify: true,
            });

            core.info(`PR created: ${createdPr.html_url}`);
